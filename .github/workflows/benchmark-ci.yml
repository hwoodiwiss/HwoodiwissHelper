name: benchmark-ci

on:
  push:
    branches:
      - main
      - dotnet-vnext
      - dotnet-nightly
    paths-ignore:
      - "**/*.gitattributes"
      - "**/*.gitignore"
      - "**/*.md"
  workflow_dispatch:

permissions: {}

env:
  DOTNET_GENERATE_ASPNET_CERTIFICATE: false
  DOTNET_MULTILEVEL_LOOKUP: 0
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_SYSTEM_CONSOLE_ALLOW_ANSI_COLOR_REDIRECTION: 1
  FORCE_COLOR: 1
  NUGET_XMLDOC_MODE: skip
  TERM: xterm

jobs:
  benchmark:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0

      - name: Install .NET Workloads
        run: dotnet workload restore

      - name: Add GH Package Source
        run: |
          dotnet nuget add source --name GitHub --username github --password ${{ secrets.GITHUB_TOKEN }} https://nuget.pkg.github.com/hwoodiwiss/index.json --store-password-in-clear-text

      - name: Run benchmarks
        shell: pwsh
        run: ./build/benchmark.ps1 -PublishResults

      - name: Upload BenchmarkDotNet artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: benchmarks
          path: ./artifacts/bin/HwoodiwissHelper.Benchmarks/release/**

      - name: Get repository name
        id: repo
        shell: pwsh
        run: |
          $repoName = "${{ github.repository }}".Split("/")[-1]
          echo "name=$repoName" >> $env:GITHUB_OUTPUT

      - name: Publish benchmark results
        uses: martincostello/benchmarkdotnet-results-publisher@0f2a458a28dbd963b1bcb029efaec245b677c7b3 # v2.0.3
        with:
          branch: ${{ github.ref_name }}
          comment-on-threshold: true
          output-file-path: ${{ steps.repo.outputs.name }}/data.json
          repo: hwoodiwiss/benchmarks
          repo-token: ${{ secrets.BENCHMARKS_TOKEN }}

      - name: Add step summary
        shell: pwsh
        run: |
          echo "## Benchmark Results" >> $env:GITHUB_STEP_SUMMARY
          echo "" >> $env:GITHUB_STEP_SUMMARY
          echo "Results published to [hwoodiwiss/benchmarks](https://hwoodiwiss.github.io/benchmarks/)." >> $env:GITHUB_STEP_SUMMARY
