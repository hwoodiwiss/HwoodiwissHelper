name: benchmarks

on:
  issue_comment:
    types: ["created"]
  schedule:
    # Weekly Monday 02:00 UTC
    - cron: "0 2 * * 1"
  workflow_dispatch:

env:
  DOTNET_GENERATE_ASPNET_CERTIFICATE: false
  DOTNET_MULTILEVEL_LOOKUP: 0
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_SYSTEM_CONSOLE_ALLOW_ANSI_COLOR_REDIRECTION: 1
  FORCE_COLOR: 1
  NUGET_XMLDOC_MODE: skip
  TERM: xterm

permissions:
  contents: read
  issues: write
  pull-requests: write
  packages: read

jobs:
  resolve-ref:
    # For issue_comment: only run on PR comments starting with '/benchmark' from the repo owner.
    # For schedule/workflow_dispatch: always run.
    if: >
      github.event_name != 'issue_comment' ||
      (github.event.issue.pull_request != '' &&
       startsWith(github.event.comment.body, '/benchmark') &&
       github.triggering_actor == github.repository_owner)
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.set-outputs.outputs.ref }}
      pr-number: ${{ steps.set-outputs.outputs.pr-number }}
      is-pr: ${{ steps.set-outputs.outputs.is-pr }}
    steps:
      - name: Get PR details (PR comment trigger)
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo, number } = context.issue
            const pr = await github.rest.pulls.get({ owner, repo, pull_number: number })
            core.exportVariable('RESOLVED_REF', pr.data.head.sha)
            core.exportVariable('RESOLVED_PR_NUMBER', String(number))
            core.exportVariable('RESOLVED_IS_PR', 'true')

      - name: Get ref (scheduled / manual trigger)
        if: github.event_name != 'issue_comment'
        run: |
          echo "RESOLVED_REF=${{ github.sha }}" >> "$GITHUB_ENV"
          echo "RESOLVED_PR_NUMBER=" >> "$GITHUB_ENV"
          echo "RESOLVED_IS_PR=false" >> "$GITHUB_ENV"

      - name: Set job outputs
        id: set-outputs
        run: |
          echo "ref=$RESOLVED_REF" >> "$GITHUB_OUTPUT"
          echo "pr-number=$RESOLVED_PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "is-pr=$RESOLVED_IS_PR" >> "$GITHUB_OUTPUT"

  benchmark:
    needs: [resolve-ref]
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-ref.outputs.ref }}

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5

      - name: Install .NET Workloads
        run: dotnet workload restore

      - name: Add GH Package Source
        run: |
          dotnet nuget add source --name GitHub --username github --password ${{ secrets.GITHUB_TOKEN }} https://nuget.pkg.github.com/hwoodiwiss/index.json --store-password-in-clear-text

      - name: Publish AOT
        shell: pwsh
        run: |
          .\build\publish-aot.ps1 -RuntimeIdentifier linux-arm64

      - name: Install crank tools
        run: |
          dotnet tool install -g Microsoft.Crank.Controller --version "0.2.0-*"
          dotnet tool install -g Microsoft.Crank.Agent --version "0.2.0-*"

      - name: Start crank-agent
        run: crank-agent &

      - name: Wait for agent to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5010/ > /dev/null 2>&1; then
              echo "Agent is ready"
              break
            fi
            echo "Waiting for agent... ($i/30)"
            sleep 2
          done

      - name: Create results directory
        run: mkdir -p benchmarks/results

      - name: Run health scenario
        run: |
          crank --config benchmarks/benchmarks.yml \
            --scenario health \
            --profile ci \
            --json benchmarks/results/health.json \
            --variable benchmarkPayloadsPath="$(pwd)/benchmarks/payloads" \
            --variable publishedBinaryPath="$(pwd)/artifacts/publish/HwoodiwissHelper/release_linux-arm64/HwoodiwissHelper"

      - name: Run configuration scenario
        run: |
          crank --config benchmarks/benchmarks.yml \
            --scenario configuration \
            --profile ci \
            --json benchmarks/results/configuration.json \
            --variable benchmarkPayloadsPath="$(pwd)/benchmarks/payloads" \
            --variable publishedBinaryPath="$(pwd)/artifacts/publish/HwoodiwissHelper/release_linux-arm64/HwoodiwissHelper"

      - name: Run webhook scenario
        run: |
          crank --config benchmarks/benchmarks.yml \
            --scenario webhook \
            --profile ci \
            --json benchmarks/results/webhook.json \
            --variable benchmarkPayloadsPath="$(pwd)/benchmarks/payloads" \
            --variable publishedBinaryPath="$(pwd)/artifacts/publish/HwoodiwissHelper/release_linux-arm64/HwoodiwissHelper"

      - name: Download previous benchmark results
        id: download-previous
        uses: actions/github-script@v8
        # Not a failure if no previous results exist (first run)
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            const fs = require('fs')
            const { execSync } = require('child_process')

            // Find the most recent benchmark-results-latest artifact,
            // excluding any that belong to this run (they don't exist yet).
            const artifacts = await github.paginate(
              github.rest.actions.listArtifactsForRepo,
              { owner: context.repo.owner, repo: context.repo.repo, name: 'benchmark-results-latest', per_page: 100 }
            )

            const previous = artifacts
              .filter(a => a.workflow_run.id !== context.runId && !a.expired)
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))[0]

            if (!previous) {
              core.info('No previous benchmark-results-latest artifact found — skipping download.')
              return
            }

            core.info(`Downloading artifact ${previous.id} from run ${previous.workflow_run.id} (created ${previous.created_at})`)

            // The /zip endpoint redirects to a blob URL. Use fetch with the token from
            // the env var we explicitly mapped above so the redirect is followed correctly.
            const token = process.env.GITHUB_TOKEN
            const zipUrl = `https://api.github.com/repos/${context.repo.owner}/${context.repo.repo}/actions/artifacts/${previous.id}/zip`
            const zipResp = await fetch(zipUrl, {
              headers: { Authorization: `Bearer ${token}`, 'User-Agent': 'actions/github-script' },
              redirect: 'follow'
            })
            if (!zipResp.ok) throw new Error(`Failed to download artifact zip: ${zipResp.status} ${zipResp.statusText}`)

            const zipPath = '/tmp/benchmark-results-previous.zip'
            const destDir = 'benchmarks/results/previous'
            fs.mkdirSync(destDir, { recursive: true })
            fs.writeFileSync(zipPath, Buffer.from(await zipResp.arrayBuffer()))
            execSync(`unzip -o ${zipPath} -d ${destDir}`)
            core.info('Previous benchmark results extracted successfully.')

      - name: Compare results and generate summary
        id: compare
        run: |
          mkdir -p benchmarks/results/previous

          # Build the markdown summary
          SUMMARY="## Benchmark Results\n\n"
          SUMMARY+="**Commit:** \`${{ needs.resolve-ref.outputs.ref }}\`\n\n"

          for scenario in health configuration webhook; do
            SUMMARY+="### ${scenario^}\n\n"
            CURRENT="benchmarks/results/${scenario}.json"
            PREVIOUS="benchmarks/results/previous/${scenario}.json"

            if [ -f "$CURRENT" ]; then
              if [ -f "$PREVIOUS" ]; then
                COMPARE_OUT=$(crank compare "$PREVIOUS" "$CURRENT" 2>&1 || true)
                SUMMARY+="\`\`\`\n${COMPARE_OUT}\n\`\`\`\n\n"
              else
                SUMMARY+="_No previous results to compare against._\n\n"
              fi
            else
              SUMMARY+="_Scenario did not produce results._\n\n"
            fi
          done

          # Write summary to GITHUB_STEP_SUMMARY
          printf "%b" "$SUMMARY" >> "$GITHUB_STEP_SUMMARY"

          # Save for the PR comment step
          printf "%b" "$SUMMARY" > /tmp/benchmark-summary.md
          echo "summary-file=/tmp/benchmark-summary.md" >> "$GITHUB_OUTPUT"

      - name: Post PR comment with results
        if: needs.resolve-ref.outputs.is-pr == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs')
            const body = fs.readFileSync('${{ steps.compare.outputs.summary-file }}', 'utf8')
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.resolve-ref.outputs.pr-number }},
              body
            })

      - name: Copy results for latest artifact
        run: cp benchmarks/results/*.json benchmarks/results/previous/ 2>/dev/null || true

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ needs.resolve-ref.outputs.ref }}
          path: benchmarks/results/*.json
          retention-days: 90

      - name: Upload benchmark results as latest
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-latest
          path: benchmarks/results/*.json
          retention-days: 90
          overwrite: true
